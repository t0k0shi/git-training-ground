name: AI PR Review

# CodeRabbit が review を submit した際に、verdict を解析してラベル管理のみ行う。
# CodeRabbit 自体のトリガー・レビュー投稿は GitHub App 側で自動実行されるため、
# assign や レビュー本体の実行はこの workflow では不要。

on:
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  # CodeRabbit bot の GitHub login 名
  # 実際の値は GitHub App インストール後に 1 度確認して合わせる
  # 参考: gh api 'repos/{owner}/{repo}/pulls/{pr}/reviews' --jq '.[].user.login'
  CODERABBIT_BOT_LOGIN: "coderabbitai[bot]"

jobs:
  post-verdict:
    # CodeRabbit のレビューのみ処理（人間のレビューは無視）
    if: github.event.review.user.login == 'coderabbitai[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Compute verdict
        id: verdict
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_ID: ${{ github.event.review.id }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # inline comment 数を取得
          INLINE=$(gh api \
            "repos/${REPO}/pulls/${PR}/reviews/${REVIEW_ID}/comments" \
            --jq 'length' 2>/dev/null || echo "0")
          echo "inline_count=$INLINE" >> "$GITHUB_OUTPUT"
          echo "::notice::CodeRabbit review: state=$REVIEW_STATE inline_comments=$INLINE"

          # 3 値判定 (Issue #28 対応):
          # request_changes_workflow を無効化したため CodeRabbit は通常 commented を submit する。
          # changes_requested は明示的に出されたケース、それ以外は inline_comments 数で判断する。
          # 閾値: critical / 🔴 / "Potential issue" など重要指摘の検出は CodeRabbit の表記に依存
          # するため、ここではシンプルに「inline_comments があれば warnings」とする。
          # 将来的に inline_comments 本文を解析して severity 別判定に拡張可能。
          case "$REVIEW_STATE" in
            changes_requested)
              echo "verdict=CHANGES_REQUESTED" >> "$GITHUB_OUTPUT"
              ;;
            approved)
              echo "verdict=APPROVED" >> "$GITHUB_OUTPUT"
              ;;
            commented)
              if [ "$INLINE" -gt 0 ]; then
                echo "verdict=APPROVED_WITH_WARNINGS" >> "$GITHUB_OUTPUT"
              else
                echo "verdict=APPROVED" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "verdict=UNKNOWN" >> "$GITHUB_OUTPUT"
              echo "::warning::未知の review state: $REVIEW_STATE"
              ;;
          esac

      - name: Update labels
        if: steps.verdict.outputs.verdict != 'UNKNOWN'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
        run: |
          set -euo pipefail

          # 既存の AI ラベルを一旦すべて削除（失敗は無視）
          for label in "do-not-merge" "ai:changes-requested" "ai:approved-with-warnings" "ai:approved"; do
            gh pr edit "$PR" --repo "$REPO" --remove-label "$label" 2>/dev/null || true
          done

          # verdict に応じてラベル付与
          case "$VERDICT" in
            CHANGES_REQUESTED)
              gh pr edit "$PR" --repo "$REPO" --add-label "do-not-merge,ai:changes-requested"
              echo "::notice::Verdict=CHANGES_REQUESTED → do-not-merge + ai:changes-requested 適用"
              ;;
            APPROVED_WITH_WARNINGS)
              gh pr edit "$PR" --repo "$REPO" --add-label "ai:approved-with-warnings"
              echo "::notice::Verdict=APPROVED_WITH_WARNINGS → ai:approved-with-warnings 適用"
              ;;
            APPROVED)
              gh pr edit "$PR" --repo "$REPO" --add-label "ai:approved"
              echo "::notice::Verdict=APPROVED → ai:approved 適用"
              ;;
          esac

      # GITHUB_TOKEN で付与したラベルは pull_request:labeled イベントを発火しないため、
      # merge-guard.yml が再実行されない。本ジョブ自身で CI を fail させて merge をブロックする。
      - name: Fail on CHANGES_REQUESTED
        if: steps.verdict.outputs.verdict == 'CHANGES_REQUESTED'
        run: |
          echo "::error::CodeRabbit のレビューで変更が要求されています (do-not-merge ラベル適用)。"
          echo "        PR のレビューコメントを確認し、指摘事項を修正してから再 push してください。"
          exit 1
