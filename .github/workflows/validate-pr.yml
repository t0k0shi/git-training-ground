name: Validate PR

on:
  pull_request:
    paths:
      - 'data/contributors.json'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check only contributors.json is changed
        run: |
          echo "Checking changed files..."
          CHANGED=$(git diff --name-only origin/main...HEAD)
          INVALID=$(echo "$CHANGED" | grep -v '^data/contributors\.json$' || true)
          if [ -n "$INVALID" ]; then
            echo ""
            echo "❌ contributors.json 以外のファイルが変更されています"
            echo "   変更されたファイル: $INVALID"
            echo ""
            echo "   💡 この PR では data/contributors.json のみ変更してください"
            exit 1
          fi
          echo "✅ 変更対象ファイル OK"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate contributors.json format
        run: npx tsx scripts/validate-contributors.ts

      - name: Verify no modifications or deletions of existing entries
        run: |
          echo "Checking for modifications or deletions..."
          # 既存エントリの github ハンドルが消えていないか確認
          git show origin/main:data/contributors.json > /tmp/contributors.main.json
          BEFORE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/contributors.main.json','utf8')).map(c => c.github).join('\n'))")
          AFTER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/contributors.json','utf8')).map(c => c.github).join('\n'))")
          MISSING=$(comm -23 <(echo "$BEFORE" | sort) <(echo "$AFTER" | sort) || true)
          if [ -n "$MISSING" ]; then
            echo ""
            echo "😅 既存エントリの保護"
            echo ""
            echo "他の人のエントリが削除されているようです。"
            echo "自分のエントリを追加するだけにしてください。"
            echo ""
            echo "消失した github ハンドル:"
            echo "$MISSING" | head -5 | while IFS= read -r handle; do
              echo "  - $handle"
            done
            echo ""
            echo "わからない場合はそのまま PR を出してください。管理人が確認します。"
            exit 1
          fi
          echo "✅ 既存エントリの削除なし"

      - name: Check addition limit (1 entry per PR)
        run: |
          echo "Checking addition count..."
          BEFORE_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/contributors.main.json','utf8')).length)")
          AFTER_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/contributors.json','utf8')).length)")
          DIFF=$((AFTER_COUNT - BEFORE_COUNT))
          if [ "$DIFF" -gt 1 ]; then
            echo ""
            echo "❌ 追加エントリが多すぎます（+${DIFF} 件）"
            echo ""
            echo "   💡 1 回の PR では 1 エントリだけ追加してください"
            exit 1
          fi
          if [ "$DIFF" -lt 0 ]; then
            echo ""
            echo "❌ エントリが減っています（${DIFF} 件）"
            exit 1
          fi
          echo "✅ 追加エントリ数 OK (+${DIFF} 件)"

      - name: Build
        run: npm run build

      - name: Success
        run: echo "✅ All checks passed!"
