# CodeRabbit AI レビュー設定
# https://docs.coderabbit.ai/reference/configuration

language: ja-JP

early_access: false

reviews:
  # レビュー時の姿勢: chill / assertive / nitpick
  # 初心者向け OSS 練習場のため "chill" (穏やか) を選択
  profile: chill

  # request_changes_workflow は無効化する。
  # 有効時の仕様「全コメントが resolve された時点で自動 APPROVE」は人間レビュアーが
  # @coderabbitai resolve や "Resolve conversation" ボタンを操作する前提のため、
  # 修正 push だけでは APPROVE 状態に移行せず、ai-review.yml の post-verdict が
  # 反応せずに do-not-merge ラベルが永久に残る問題が発生する。
  # 通常の commented 形式に統一し、verdict 判定は post-verdict 側で inline_comments
  # 数を見て行う (CHANGES_REQUESTED / APPROVED_WITH_WARNINGS / APPROVED の 3 値)。
  # 詳細: Issue #28
  request_changes_workflow: false

  # PR トップにサマリーを投稿
  high_level_summary: true

  # walkthrough の折りたたみ
  collapse_walkthrough: true

  # AI 生成の詩（余計なので無効化）
  poem: false

  # レビュー全体の結果表示
  review_status: true

  # リポジトリ全体に適用するレビュー指示
  # (commit-lint.yml でも機械的に検証しているが、CodeRabbit にも注意喚起させる)
  path_instructions:
    - path: "**/*"
      instructions: |
        このリポジトリでは commit メッセージが CONTRIBUTING.md の規約に従っている必要があります。
        許可される形式:
          1. "Add <yourname> to contributors" (contributors.json 追加の初心者 PR)
          2. Conventional Commits: "<type>(<scope>)?!?: <subject>"
             type: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert
        絵文字プレフィックス (📚, 🐛 等) は使用禁止。
        もし違反する commit があれば、その旨を明示的に指摘してください。

  auto_review:
    enabled: true
    # Draft PR はレビューしない
    drafts: false

  # レビュー対象から除外するパス
  # (glob パターンは CodeRabbit 独自形式: "!" で除外)
  path_filters:
    # contributors.json の検証は validate-pr.yml 側で実施するため CodeRabbit では対象外
    - "!data/contributors.json"
    # 純粋なドキュメント変更はレビュー不要
    - "!**/*.md"
    - "!docs/**"
    # ビルド成果物・依存関係
    - "!package-lock.json"
    - "!out/**"
    - "!.next/**"

chat:
  # コメントへの自動応答を有効化 (@coderabbitai への返信など)
  auto_reply: true
